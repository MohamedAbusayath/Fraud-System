apiVersion: apps/v1
kind: Deployment

metadata:
  name: fraud-service

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: fraud-service

  template:
    metadata:
      labels:
        app: fraud-service

    spec:
      containers:
        - name: fraud-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}